# nginx-frontend.conf
# Serves the React static build with SPA fallback.  Lives inside the frontend
# container; the repo-root nginx.conf is what handles /api routing.

server {
  listen 80;
  server_name _;

  # Static assets get long cache; HTML stays no-cache so SPA navigations work.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    root /usr/share/nginx/html;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }
}
