version: "3.9"

# SmartSpend Phase 1+ infrastructure.
# Brings up: Postgres 16, Redis 7, MLflow tracking server.
#
# Usage:
#   cd infra
#   docker-compose up -d
#
# Then set in .env (or environment):
#   DB_HOST=127.0.0.1
#   REDIS_URL=redis://localhost:6379/0
#   MLFLOW_TRACKING_URI=http://localhost:5001
#
# Postgres data is persisted in the `pgdata` named volume.
# Redis data is ephemeral by default (append-only mode for durability can
# be enabled by uncommenting the Redis command below).

services:

  postgres:
    image: postgres:16-alpine
    container_name: smartspend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartspend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root@4321@}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount schema so first-run init works automatically
      - ../database/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartspend_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartspend_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Uncomment for append-only persistence:
    # command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: smartspend_mlflow
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflowdata:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  mlflowdata:
