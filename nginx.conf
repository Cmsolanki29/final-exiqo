# Repo-root nginx reverse proxy used by docker-compose.
# Single port 80 entrypoint that fronts both backend and frontend:
#   /api/...   → backend:8000   (FastAPI)
#   /health    → backend:8000   (public probe, no /api prefix)
#   /docs      → backend:8000   (FastAPI swagger UI)
#   /openapi.json → backend:8000
#   /          → frontend:80    (React static build)

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Allow large request bodies for SHAP / training payloads.
  client_max_body_size 10m;

  upstream smartspend_backend {
    server backend:8000;
  }

  upstream smartspend_frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # Backend routes.
    location /api/ {
      proxy_pass http://smartspend_backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location = /health {
      proxy_pass http://smartspend_backend;
      proxy_set_header Host $host;
    }

    location /docs {
      proxy_pass http://smartspend_backend;
      proxy_set_header Host $host;
    }

    location /openapi.json {
      proxy_pass http://smartspend_backend;
      proxy_set_header Host $host;
    }

    # Everything else → React SPA.
    location / {
      proxy_pass http://smartspend_frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
