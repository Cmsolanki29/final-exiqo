<html lang="en">
<head>

<title>SmartSpend — Subscription AI Scanner</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFC;--surface:#FFFFFF;--card:#FFFFFF;--border:#E2E8F0;
  --purple:#7C3AED;--cyan:#0891B2;--emerald:#059669;--rose:#E11D48;
  --amber:#D97706;--violet:#9333EA;--sky:#0284C7;--teal:#0D9488;
  --text:#0F172A;--muted:#64748B;--subtle:#94A3B8;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;height:56px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 8px rgba(15,23,42,.06);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
}
.topbar h1{font-size:15px;font-weight:700;color:#059669}
.topbar p{font-size:11px;color:var(--muted)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{
  padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--card);color:var(--muted);
  cursor:pointer;transition:all .15s;
  box-shadow:0 1px 2px rgba(15,23,42,.04);
}
.btn:hover{border-color:var(--emerald);color:var(--text);background:#F0FDF4}
.btn-primary{background:#DCFCE7;border-color:var(--emerald);color:var(--emerald)}
.hint{font-size:10px;color:var(--subtle)}

.viewport{
  position:fixed;top:56px;left:0;right:0;bottom:0;
  overflow:hidden;cursor:grab;
}
.viewport.grabbing{cursor:grabbing}
.canvas{
  position:absolute;transform-origin:0 0;
  padding:40px 48px 80px;
  min-width:max-content;min-height:max-content;
  background-image:radial-gradient(circle,#CBD5E1 1px,transparent 1px);
  background-size:24px 24px;
}

#connectors{
  position:absolute;top:0;left:0;
  pointer-events:none;overflow:visible;
  z-index:1;
}

.tree-node{
  position:absolute;
  display:flex;flex-direction:column;align-items:flex-start;
  z-index:10;
}
.tree-node[data-root="1"]{z-index:12}

.node-box{
  position:relative;
  min-width:160px;max-width:220px;
  padding:10px 14px;
  border-radius:10px;
  border:2px solid var(--nc,var(--emerald));
  background:linear-gradient(145deg,#FFFFFF 0%,#F8FAFC 100%);
  cursor:pointer;
  user-select:none;
  transition:transform .15s,box-shadow .2s,border-color .2s;
  box-shadow:0 2px 8px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
}
.node-box:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(15,23,42,.10),0 0 0 3px color-mix(in srgb,var(--nc) 12%,transparent);
}
.node-box.expanded{border-color:var(--nc);box-shadow:0 0 0 2px color-mix(in srgb,var(--nc) 18%,transparent),0 8px 24px rgba(15,23,42,.10)}
.node-box.root{
  min-width:200px;max-width:240px;padding:14px 18px;
  border-width:2px;font-weight:700;
  background:linear-gradient(145deg,#F0FDF4,#DCFCE7);
  z-index:12;
}
.node-box.root.has-children.expanded .node-detail{display:none}
.node-box.has-children::after{
  content:'';
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:7px solid var(--nc,var(--emerald));
  opacity:.6;
}
.node-box.collapsed.has-children::before{
  content:'+';
  position:absolute;right:8px;top:8px;
  width:18px;height:18px;border-radius:50%;
  background:#F1F5F9;border:1px solid var(--nc);
  color:var(--nc);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.node-box.expanded.has-children::before{
  content:'−';
  position:absolute;right:8px;top:8px;
  width:18px;height:18px;border-radius:50%;
  background:color-mix(in srgb,var(--nc) 12%,#fff);
  border:1px solid var(--nc);
  color:var(--nc);font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
}

.node-tag{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--nc);margin-bottom:4px;opacity:.95;
}
.node-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;padding-right:22px}
.node-sub{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}
.node-box.root .node-title{font-size:15px;color:#059669}

.node-detail{
  display:none;margin-top:8px;padding:10px 12px;
  background:#F8FAFC;border-radius:8px;
  border:1px solid var(--border);
  max-width:220px;font-size:10px;color:var(--muted);line-height:1.55;
}
.node-box.expanded .node-detail{display:block}
.node-detail ul{margin:6px 0 0 14px;padding:0}
.node-detail li{margin-bottom:3px}

.zoom-controls{
  position:fixed;bottom:24px;right:24px;z-index:300;
  display:flex;flex-direction:column;gap:6px;
}
.zoom-controls button{
  width:36px;height:36px;border-radius:10px;

const NODE_W = 168;
const NODE_H_BASE = 68;
const SIBLING_GAP = 24;
const LEVEL_GAP = 56;
const ROOT_GAP = 44;      /* clear space between root row and step row */
const ROOT_ROW_H = 76;    /* fixed height for root lane */

const state = { expanded: new Set(['root']), positions: new Map() };

function rowY(depth) {
  if (depth === 0) return 0;
  return ROOT_ROW_H + ROOT_GAP + (depth - 1) * (NODE_H_BASE + LEVEL_GAP);
}

function nodeHeight(node, expanded, hasKids) {
  if (node.id === 'root' && hasKids && expanded) return ROOT_ROW_H;
  if (expanded && node.detail && !(hasKids && expanded)) return NODE_H_BASE + 72;
  return NODE_H_BASE;
}

/** Top-down: root centered on its own top row; steps in horizontal row below */
function layoutHorizontal(node, depth, xCursor) {
  const hasKids = node.children && node.children.length > 0;
  const expanded = state.expanded.has(node.id);
  const selfH = nodeHeight(node, expanded, hasKids);
  const y = rowY(depth);

  if (!hasKids || !expanded) {
    const x = xCursor;
    state.positions.set(node.id, { x, y, w: NODE_W, h: selfH, node, depth });
    return {
      nextX: xCursor + NODE_W + SIBLING_GAP,
      width: NODE_W,
      centerX: x + NODE_W / 2,
      bottomY: y + selfH,
      topY: y,
    };
  }

  let cx = xCursor;
  const childMeta = [];
  for (const child of node.children) {
    const res = layoutHorizontal(child, depth + 1, cx);
    childMeta.push({ child, centerX: res.centerX, topY: res.topY });
    cx = res.nextX;
  }

  const totalW = Math.max(NODE_W, cx - xCursor - SIBLING_GAP);
  const nodeX = xCursor + (totalW - NODE_W) / 2;

  state.positions.set(node.id, {
    x: nodeX,
    y,
    w: NODE_W,
    h: selfH,
    node,
    depth,
    children: childMeta,
    centerX: nodeX + NODE_W / 2,
    bottomY: y + selfH,
  });

  return {
    nextX: cx,
    width: totalW,
    centerX: nodeX + NODE_W / 2,
    bottomY: y + selfH,
    topY: y,
  };
}

function renderNodesFixed() {
  const mount = document.getElementById('treeRoot');
  mount.innerHTML = '';
  const entries = [...state.positions.entries()].sort((a, b) => {
    if (a[0] === 'root') return 1;
    if (b[0] === 'root') return -1;
    return 0;
  });
  entries.forEach(([id, pos]) => {
    const n = pos.node;
    const hasKids = n.children && n.children.length > 0;
    const isExp = state.expanded.has(id);

    const el = document.createElement('div');
    el.className = 'tree-node';
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    if (id === 'root') el.dataset.root = '1';

    const box = document.createElement('div');
    box.className = 'node-box' + (id === 'root' ? ' root' : '') +
      (hasKids ? ' has-children' : '') +
      (isExp ? ' expanded' : ' collapsed');
    box.style.setProperty('--nc', n.color);

    box.innerHTML = `
      <div class="node-tag">${n.tag}</div>
      <div class="node-title">${n.title.replace(/\n/g, '<br>')}</div>
      ${n.sub ? `<div class="node-sub">${n.sub}</div>` : ''}
      ${(isExp && n.detail && !(hasKids && isExp)) ? `<div class="node-detail">${n.detail}</div>` : ''}
    `;

    box.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hasKids || n.detail) {
        if (state.expanded.has(id)) state.expanded.delete(id);
        else state.expanded.add(id);
        relayoutFixed();
      }
    });

    el.appendChild(box);
    mount.appendChild(el);
  });
}

function drawConnectorsFixed() {
  const svg = document.getElementById('connectors');
  const canvas = document.getElementById('canvas');
  const w = canvas.offsetWidth || 1200;
  const h = canvas.offsetHeight || 800;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.style.width = w + 'px';
  svg.style.height = h + 'px';
  svg.innerHTML = '';

  state.positions.forEach((pos) => {
    if (!pos.children || !pos.children.length) return;
    const px = pos.centerX ?? pos.x + pos.w / 2;
    const py = pos.bottomY ?? pos.y + pos.h;
    const childTops = pos.children.map(({ child, centerX }) => {
      const cp = state.positions.get(child.id);
      if (!cp) return null;
      return {
        cx: centerX ?? cp.x + cp.w / 2,
        cy: cp.y,
        color: cp.node.color,
      };
    }).filter(Boolean);
    if (!childTops.length) return;

    const busY = pos.node.id === 'root'
      ? py + 22
      : py + Math.max(18, (childTops[0].cy - py) * 0.42);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const minX = Math.min(...childTops.map((c) => c.cx));
    const maxX = Math.max(...childTops.map((c) => c.cx));
    let d = `M ${px} ${py} L ${px} ${busY}`;
    if (childTops.length > 0) {
      d += ` M ${minX} ${busY} L ${maxX} ${busY}`;
      childTops.forEach((c) => {
        d += ` M ${c.cx} ${busY} L ${c.cx} ${c.cy}`;
      });
    }
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', pos.node.color);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('opacity', '0.65');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
  });
}

function getContentBounds() {
  let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
  state.positions.forEach((pos) => {
    minX = Math.min(minX, pos.x);
    minY = Math.min(minY, pos.y);
    maxX = Math.max(maxX, pos.x + pos.w);
    maxY = Math.max(maxY, pos.y + pos.h);
  });
  if (!isFinite(minX)) return { minX: 0, minY: 0, maxX: 800, maxY: 400 };
  return { minX, minY, maxX, maxY };
}

function relayoutFixed() {
  state.positions.clear();
  layoutHorizontal(TREE, 0, 0);
  const bounds = getContentBounds();
  const pad = 40;
  const ox = pad - bounds.minX;
  const oy = pad - bounds.minY;
  state.positions.forEach((pos) => {
    pos.x += ox;
    pos.y += oy;
    pos.centerX = pos.x + pos.w / 2;
    pos.bottomY = pos.y + pos.h;
    if (pos.children) {
      pos.children.forEach((c) => {
        const cp = state.positions.get(c.child.id);
        if (cp) c.centerX = cp.x + cp.w / 2;
      });
    }
  });
  const canvas = document.getElementById('canvas');
  canvas.style.width = bounds.maxX - bounds.minX + pad * 2 + 'px';
  canvas.style.height = bounds.maxY - bounds.minY + pad * 2 + 'px';
  renderNodesFixed();
  drawConnectorsFixed();
  requestAnimationFrame(fitView);
}

function expandAll() {
  function walk(n) {
    state.expanded.add(n.id);
    (n.children || []).forEach(walk);
  }
  walk(TREE);
  relayoutFixed();
}

function collapseAll() {
  state.expanded = new Set(['root']);
  relayoutFixed();
}

let scale = 0.85, panX = 40, panY = 20, dragging = false, lastX, lastY;

function applyTransform() {
  const c = document.getElementById('canvas');
  c.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
}

const viewport = document.getElementById('viewport');
viewport.addEventListener('mousedown', e => {
  if (e.target.closest('.node-box')) return;
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  viewport.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  viewport.classList.remove('grabbing');
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.06 : 0.06;
  scale = Math.min(1.8, Math.max(0.25, scale + delta));
  applyTransform();
}, { passive: false });

function zoomIn() { scale = Math.min(1.8, scale + 0.1); applyTransform(); }
function zoomOut() { scale = Math.max(0.25, scale - 0.1); applyTransform(); }

function fitView() {
  const vp = viewport.getBoundingClientRect();
  const canvas = document.getElementById('canvas');
  const cw = canvas.offsetWidth || 1200;
  const ch = canvas.offsetHeight || 600;
  const margin = 32;
  scale = Math.min(1, (vp.width - margin) / cw, (vp.height - margin) / ch);
  panX = Math.max(margin / 2, (vp.width - cw * scale) / 2);
  panY = Math.max(margin / 2, (vp.height - ch * scale) / 2);
  applyTransform();
}

window.addEventListener('resize', () => requestAnimationFrame(fitView));

state.expanded = new Set(['root']);
relayoutFixed();
</script>
</body>
</html>
